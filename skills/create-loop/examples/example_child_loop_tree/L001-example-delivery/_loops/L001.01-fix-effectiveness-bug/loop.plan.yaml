# loop.plan — CHILD loop (L001.01) DAG: a small isomorphic loop for the
# effectiveness bug fix. reproduce -> root-cause -> fix -> regression-verify.
# Every node carries child_loops: [] (no grandchildren materialized here).
# Tokens are LOCKED — see references/loop_plan_spec.md Glossary.

schema_version: "1.0.0"
plan_id: "plan-fix-effectiveness-bug-L001.01"
goal: "Fix the effectiveness bug that harms the final deliverable's effect."
true_intent: "Restore correct end-to-end behavior with a root-cause fix, not a symptom patch."
non_goals:
  - "Refactoring code unrelated to the effectiveness bug."

success_criteria:
  - id: "sc-rootcause"
    statement: "The root cause is identified and documented."
    measurable: true
  - id: "sc-regression"
    statement: "A regression test reproduces the bug before the fix and passes after."
    measurable: true

failure_criteria:
  - "The bug cannot be reproduced within the child loop's budget."

termination:
  max_iterations: 12
  max_wall_clock_hours: 6
  max_cost_units: 150
  done_when: "all success_criteria met and all top-level nodes completed"

constraints:
  - "Change only what the root cause requires."

nodes:
  # (1) REPRODUCE — root node: build a failing regression test.
  - id: "reproduce"
    kind: "milestone"
    title: "Reproduce the effectiveness bug"
    design_invariant: true
    status: "completed"
    requires: []
    produces:
      - "artifacts/repro.md"
    inputs: []
    preconditions: []
    postconditions:
      - "A deterministic repro of the bug exists."
    gate:
      kind: "test"
      threshold: null
      rubric: null
      evidence_ref: "evidence/reproduce.json"
    retry_policy:
      max_attempts: 3
      backoff_base_seconds: 2.0
      jitter: true
    on_failure: "local_retry"
    priority: 100
    risk: "med"
    parallelizable: false
    allow_subgraph: false
    subgraph: null
    child_loops: []
    assignee: "agent"
    notes: ""

  # (2) ROOT-CAUSE — analyze the repro to the underlying cause.
  - id: "root_cause"
    kind: "milestone"
    title: "Identify the root cause"
    design_invariant: true
    status: "running"
    requires:
      - "reproduce"
    produces:
      - "artifacts/root-cause.md"
    inputs:
      - "artifacts/repro.md"
    preconditions:
      - "A deterministic repro exists."
    postconditions:
      - "The root cause is documented with supporting evidence."
    gate:
      kind: "llm_judge"
      threshold: 0.8
      rubric: "rubrics/root_cause.md"
      evidence_ref: "evidence/root_cause.json"
    retry_policy:
      max_attempts: 3
      backoff_base_seconds: 2.0
      jitter: true
    on_failure: "local_patch"
    priority: 90
    risk: "high"
    parallelizable: false
    allow_subgraph: false
    subgraph: null
    child_loops: []
    assignee: "agent"
    notes: ""

  # (3) FIX — apply the root-cause fix.
  - id: "fix"
    kind: "milestone"
    title: "Apply the root-cause fix"
    design_invariant: true
    status: "pending"
    requires:
      - "root_cause"
    produces:
      - "artifacts/fix.md"
    inputs:
      - "artifacts/root-cause.md"
    preconditions:
      - "The root cause is documented."
    postconditions:
      - "The fix is applied and the deliverable builds."
    gate:
      kind: "test"
      threshold: null
      rubric: null
      evidence_ref: "evidence/fix.json"
    retry_policy:
      max_attempts: 3
      backoff_base_seconds: 3.0
      jitter: true
    on_failure: "local_patch"
    priority: 80
    risk: "high"
    parallelizable: false
    allow_subgraph: false
    subgraph: null
    child_loops: []
    assignee: "agent"
    notes: ""

  # (4) REGRESSION-VERIFY — prove the fix; produces the return evidence.
  - id: "regression_verify"
    kind: "gate"
    title: "Verify the fix with the regression test"
    design_invariant: true
    status: "pending"
    requires:
      - "fix"
    produces:
      - "artifacts/fix-evidence.md"
    inputs:
      - "artifacts/fix.md"
      - "artifacts/repro.md"
    preconditions:
      - "The fix is applied."
    postconditions:
      - "The regression test passes and the effectiveness bug is confirmed fixed."
    gate:
      kind: "test"
      threshold: null
      rubric: null
      evidence_ref: "evidence/regression_verify.json"
    retry_policy:
      max_attempts: 2
      backoff_base_seconds: 3.0
      jitter: true
    on_failure: "replan"
    priority: 70
    risk: "high"
    parallelizable: false
    allow_subgraph: false
    subgraph: null
    child_loops: []
    assignee: "subagent"
    notes: "Its passing evidence backs the return_contract's required_outputs."

created: "2026-07-01"
plan_version: 1
