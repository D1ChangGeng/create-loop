schema_version: 1.0.0
plan_id: plan-fix-effectiveness-bug-L001.01
goal: Fix the effectiveness bug that harms the final deliverable's effect.
true_intent: Restore correct end-to-end behavior with a root-cause fix, not a symptom patch.
non_goals:
- Refactoring code unrelated to the effectiveness bug.
success_criteria:
- id: sc-rootcause
  statement: The root cause is identified and documented.
  measurable: true
- id: sc-regression
  statement: A regression test reproduces the bug before the fix and passes after.
  measurable: true
failure_criteria:
- The bug cannot be reproduced within the child loop's budget.
termination:
  max_iterations: 12
  max_wall_clock_hours: 6
  max_cost_units: 150
  done_when: all success_criteria met and all top-level nodes completed
  max_depth: 3
  max_child_loops: 20
constraints:
- Change only what the root cause requires.
nodes:
- id: reproduce
  kind: milestone
  title: Reproduce the effectiveness bug
  design_invariant: true
  status: completed
  requires: []
  produces:
  - artifacts/repro.md
  inputs: []
  preconditions: []
  postconditions:
  - A deterministic repro of the bug exists.
  gate:
    kind: test
    threshold: null
    rubric: null
    evidence_ref: evidence/reproduce.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_retry
  priority: 100
  risk: med
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
