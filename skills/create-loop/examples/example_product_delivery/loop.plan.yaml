    - id: impl_persistence
      kind: milestone
      title: Implement the persistence layer + migrations
      design_invariant: false
      status: completed
      requires: []
      produces:
      - artifacts/service/persistence/
      inputs:
      - artifacts/architecture.md
      preconditions: []
      postconditions:
      - Core resources survive a restart; the persistence integration test passes against a real database.
      gate:
        kind: test
        threshold: null
        rubric: null
        evidence_ref: evidence/impl_persistence.json
      retry_policy:
        max_attempts: 3
        backoff_base_seconds: 3.0
        jitter: true
      on_failure: local_patch
      priority: 60
      risk: high
      parallelizable: true
      allow_subgraph: false
      subgraph: null
      child_loops: []
      assignee: agent
      notes: "Migration test failed on attempt 1 (FK constraint), fixed by local_patch, passed on attempt\
        \ 2 \u2014 see evidence ledger."
    - id: impl_api
      kind: milestone
      title: Implement the REST endpoints wiring auth + persistence
      design_invariant: false
      status: completed
      requires:
      - impl_auth
      - impl_persistence
      produces:
