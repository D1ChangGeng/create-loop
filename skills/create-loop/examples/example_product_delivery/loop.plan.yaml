  postconditions:
  - A human has explicitly approved (or refused) the production release.
  gate:
    kind: human_approval
    threshold: null
    rubric: null
    evidence_ref: evidence/N9_release_approval.json
  retry_policy:
    max_attempts: 1
    backoff_base_seconds: 0.0
    jitter: false
  on_failure: escalate
  priority: 45
  risk: high
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: user
