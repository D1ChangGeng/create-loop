  inputs:
  - artifacts/deployment_record.json
  preconditions:
  - A deployment record exists to be undone.
  postconditions:
  - The previous known-good deployment is restored and the migration is reverted.
  gate: null
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 5.0
    jitter: true
  on_failure: escalate
  priority: 42
  risk: high
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: 'Saga compensation: node.contract.compensation_of = N10_deploy. Triggered by the saga on deploy
    failure, not by normal readiness.'
- id: N11_handoff
  kind: milestone
  title: Write the operations handoff document
  design_invariant: true
  status: pending
  requires:
  - N10_deploy
  produces:
  - artifacts/handoff.md
  inputs:
  - artifacts/deployment_record.json
