      inputs:
      - artifacts/architecture.md
      preconditions: []
      postconditions:
      - Protected routes reject anonymous requests; the auth unit + integration tests pass.
      gate:
        kind: test
        threshold: null
        rubric: null
        evidence_ref: evidence/impl_auth.json
      retry_policy:
        max_attempts: 3
        backoff_base_seconds: 3.0
        jitter: true
      on_failure: local_patch
      priority: 60
      risk: high
      parallelizable: true
      allow_subgraph: false
      subgraph: null
      child_loops: []
      assignee: agent
