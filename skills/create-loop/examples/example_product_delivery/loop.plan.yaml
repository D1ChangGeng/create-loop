  produces:
  - artifacts/requirements_baseline.md
  inputs:
  - artifacts/feasibility_report.md
  preconditions:
  - Feasibility is proven.
  postconditions:
  - Each success criterion maps to at least one testable requirement.
  gate:
    kind: llm_judge
    threshold: 0.8
    rubric: rubrics/requirements_completeness.md
    evidence_ref: evidence/N4_requirements_baseline.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_patch
  priority: 80
  risk: med
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: ''
- id: N5_architecture
