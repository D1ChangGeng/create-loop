schema_version: 1.0.0
plan_id: plan-product-delivery-0007
goal: Ship a REST API service with auth, persistence, and a deployment.
true_intent: "Deliver a production-operable HTTP API \u2014 authenticated, backed by durable storage,\
  \ deployed behind a health-checked endpoint with a tested rollback path \u2014 that a fresh on-call\
  \ engineer can operate from the handoff doc alone."
non_goals:
- A public marketing site or client SDK.
- Multi-region or autoscaling infrastructure beyond a single deployment target.
- Migrating any pre-existing data set into the new store.
success_criteria:
- id: sc-auth
  statement: Every non-public route rejects unauthenticated requests and accepts valid credentials, proven
    by the auth integration test suite.
  measurable: true
- id: sc-persistence
  statement: Core resources survive a process restart, proven by the persistence integration test suite
    against a real database.
  measurable: true
- id: sc-deploy
  statement: The deployed service answers its health check and a smoke test over HTTP after release.
  measurable: true
- id: sc-rollback
  statement: A rehearsed rollback restores the previous known-good deployment within the incident SLO.
  measurable: true
- id: sc-operable
  statement: A fresh engineer can run, observe, and roll back the service using only the handoff document.
  measurable: false
failure_criteria:
- Budget or iteration cap exhausted before all measurable success_criteria pass.
- A production deployment cannot be rolled back (compensation path proven non-functional).
- Release approval is refused and no acceptable alternative plan is reachable.
termination:
  max_iterations: 60
  max_wall_clock_hours: 120
  max_cost_units: 2000
  done_when: all success_criteria met and all top-level nodes completed
  max_depth: 3
  max_child_loops: 20
constraints:
- Respect the approved budget of 2000 cost units.
- No production deployment without an explicit human release approval.
- Every side-effecting deploy must have a paired, rehearsed compensation (rollback).
- Secrets are read from the platform secret store, never hard-coded or logged.
nodes:
- id: N0_charter
  kind: gate
  title: Charter / control-profile gate (Layer 0 interview)
  design_invariant: true
  status: completed
  requires: []
  produces:
  - artifacts/task_profile.yaml
  inputs:
  - the short goal string
  preconditions: []
  postconditions:
  - The control profile (task type, end-state, success/failure criteria, risk & approval boundary, persistence
    requirements) is agreed and recorded.
  - Unknowns/assumptions are routed to owner nodes rather than demanded up front.
  gate:
    kind: human_approval
    threshold: null
    rubric: null
    evidence_ref: evidence/N0_charter.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 1.0
    jitter: true
  on_failure: escalate
  priority: 100
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: "The interview is Layer 0 (concepts.md \xA78). Its output is the control profile that shapes\
    \ this top-level graph."
- id: N1_discovery
  kind: milestone
  title: Discover context, current systems, and constraints
  design_invariant: true
  status: completed
  requires:
  - N0_charter
  produces:
  - artifacts/discovery_findings.md
  inputs:
  - artifacts/task_profile.yaml
  preconditions:
  - The control profile exists.
  postconditions:
  - Key unknowns (auth scheme options, storage options, deploy target) are enumerated with evidence.
  gate:
    kind: llm_judge
    threshold: 0.8
    rubric: rubrics/discovery_quality.md
    evidence_ref: evidence/N1_discovery.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_retry
  priority: 90
  risk: med
  parallelizable: true
  allow_subgraph: true
  subgraph: null
  child_loops: []
  assignee: subagent
  notes: Runs concurrently with N2_risk_screen; they share no dependency beyond N0_charter.
- id: N2_risk_screen
  kind: milestone
  title: Screen security, data, and operational risks
  design_invariant: true
  status: completed
  requires:
  - N0_charter
  produces:
  - artifacts/risk_register.md
  inputs:
  - artifacts/task_profile.yaml
  preconditions:
  - The control profile exists.
  postconditions:
  - A risk register scores auth, data-handling, and deploy/rollback risks and names required mitigations.
  gate:
    kind: llm_judge
    threshold: 0.75
    rubric: rubrics/risk_screen.md
    evidence_ref: evidence/N2_risk_screen.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_retry
  priority: 90
  risk: med
  parallelizable: true
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: subagent
  notes: Runs concurrently with N1_discovery; the fan-in happens at N3_feasibility.
- id: N3_feasibility
  kind: milestone
  title: Prove feasibility with a throwaway spike
  design_invariant: true
  status: completed
  requires:
  - N1_discovery
  - N2_risk_screen
  produces:
  - artifacts/feasibility_report.md
  inputs:
  - artifacts/discovery_findings.md
  - artifacts/risk_register.md
  preconditions:
  - Discovery findings and the risk register are verified.
  postconditions:
  - A spike demonstrates the chosen stack can authenticate, persist, and deploy end-to-end.
  gate:
    kind: test
    threshold: null
    rubric: null
    evidence_ref: evidence/N3_feasibility.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 5.0
    jitter: true
  on_failure: local_patch
  priority: 85
  risk: med
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: "Merges the N1_discovery \u2225 N2_risk_screen branches; it is ready only when BOTH are completed."
- id: N4_requirements_baseline
