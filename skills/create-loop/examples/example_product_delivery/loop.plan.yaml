    max_attempts: 3
    backoff_base_seconds: 4.0
    jitter: true
  on_failure: local_patch
  priority: 50
  risk: med
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: subagent
