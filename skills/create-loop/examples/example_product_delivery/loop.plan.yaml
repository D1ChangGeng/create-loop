    with a token.
- id: N10_deploy
  kind: milestone
  title: Deploy the service to the production target
  design_invariant: true
  status: blocked
  requires:
  - N9_release_approval
  produces:
  - artifacts/deployment_record.json
  inputs:
  - artifacts/service/
  - artifacts/release_approval.md
  preconditions:
  - Release approval is granted.
  - The production database credential is provisioned in the secret store.
  postconditions:
  - The service answers its health check and the post-deploy smoke test passes.
  gate:
    kind: automated_check
    threshold: null
    rubric: null
    evidence_ref: evidence/N10_deploy.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 10.0
    jitter: true
  on_failure: escalate
  priority: 40
  risk: high
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: 'Side-effecting (activity): logged to the event log and never blindly replayed. Its saga undo
    is N10c_rollback_compensation.'
- id: N10c_rollback_compensation
  kind: compensation
  title: Roll back the deployment (saga undo of N10_deploy)
  design_invariant: true
  status: pending
  requires:
  - N10_deploy
  produces:
