  preconditions:
  - The service is deployed and healthy.
  postconditions:
  - A fresh engineer can run, observe, and roll back the service from the doc alone.
  gate:
    kind: artifact_exists
    threshold: null
    rubric: null
    evidence_ref: evidence/N11_handoff.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_patch
  priority: 35
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: ''
- id: N12_closeout
  kind: milestone
  title: Close out the run
  design_invariant: true
  status: pending
  requires:
  - N11_handoff
  produces:
  - artifacts/closeout_report.md
  inputs:
  - artifacts/handoff.md
  preconditions:
  - The handoff document exists.
  postconditions:
  - All success_criteria are confirmed met and the run is archived.
  gate:
    kind: automated_check
    threshold: null
    rubric: null
    evidence_ref: evidence/N12_closeout.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: escalate
  priority: 30
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: Confirms termination.done_when before the loop terminates.
