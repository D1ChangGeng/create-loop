    backoff_base_seconds: 5.0
    jitter: true
  on_failure: replan
  priority: 65
  risk: high
  parallelizable: false
  allow_subgraph: true
  subgraph:
    parent_ref: N7_implementation
    schema_version: 1.0.0
    plan_version: 2
    nodes:
    - id: impl_auth
