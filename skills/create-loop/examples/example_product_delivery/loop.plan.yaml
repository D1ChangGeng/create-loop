  gate:
    kind: llm_judge
    threshold: 0.8
    rubric: rubrics/architecture_review.md
    evidence_ref: evidence/N5_architecture.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: replan
  priority: 75
  risk: med
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: That an architecture exists is design-invariant; WHICH modules it names is captured in the artifact,
    not as top-level nodes.
- id: N6_verification_plan
  kind: milestone
  title: Author the verification plan
  design_invariant: true
  status: completed
  requires:
  - N5_architecture
  produces:
  - artifacts/verification_plan.md
  - artifacts/coverage_matrix.csv
  inputs:
  - artifacts/architecture.md
  - artifacts/requirements_baseline.md
  preconditions:
  - The architecture is approved.
  postconditions:
  - Every measurable success criterion has a named test in the coverage matrix.
  gate:
    kind: automated_check
    threshold: null
    rubric: null
    evidence_ref: evidence/N6_verification_plan.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_patch
  priority: 70
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: The coverage matrix is machine-checkable, hence an automated_check gate.
- id: N7_implementation
