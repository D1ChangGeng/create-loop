schema_version: 1.0.0
plan_id: plan-research-survey-0007
goal: Produce a rigorous survey and a defensible recommendation on which retrieval-augmentation strategy
  best reduces hallucination in long-context question answering, with cited evidence.
true_intent: "Deliver a peer-reviewable research report whose recommendation withstands expert scrutiny\
  \ \u2014 the value is the strength and transparency of the evidence, not merely naming a winner."
non_goals:
- Shipping or productionising any retrieval system; this is an investigation, not an implementation.
- Vendor procurement, pricing, or contract negotiation.
success_criteria:
- id: sc-1
  statement: Every claim in the final recommendation is traceable to at least one cited primary source
    recorded in the evidence ledger.
  measurable: true
- id: sc-2
  statement: At least three candidate strategies are compared on a common benchmark with reported effect
    sizes and confidence intervals.
  measurable: true
- id: sc-3
  statement: The recommendation passes an independent peer-review-style rubric at >= 0.9.
  measurable: false
- id: sc-4
  statement: A human research lead approves the recommendation for release.
  measurable: false
failure_criteria:
- Cost budget exhausted before at least three strategies are compared on a common benchmark.
- No strategy shows a statistically distinguishable effect and the evidence base cannot be expanded within
  budget.
termination:
  max_iterations: 30
  max_wall_clock_hours: null
  max_cost_units: 600
  done_when: all success_criteria met and all top-level nodes completed
  max_depth: 3
  max_child_loops: 20
constraints:
- Deliverable class is research_report; no software is shipped.
- Only openly licensed or properly attributed sources may be cited.
- Respect the 600 cost-unit budget.
nodes:
- id: N0_charter
  kind: gate
  title: Charter / control-profile sign-off
  design_invariant: true
  status: completed
  requires: []
  produces:
  - artifacts/charter/task_profile.yaml
  inputs: []
  preconditions: []
  postconditions:
  - True intent, deliverable class (research_report), success/failure criteria, and approval boundary
    are agreed and recorded.
  gate:
    kind: human_approval
    threshold: null
    rubric: null
    evidence_ref: evidence/N0_charter.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 1.0
    jitter: true
  on_failure: escalate
  priority: 100
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: user
  notes: Layer 0. Collects only design-time invariants; open unknowns are routed to owner nodes as assumptions/research
    questions.
- id: N1_scoping
