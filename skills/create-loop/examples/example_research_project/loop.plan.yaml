    threshold: 0.8
    rubric: rubrics/scoping_quality.md
    evidence_ref: evidence/N1_scoping.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_retry
  priority: 95
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
