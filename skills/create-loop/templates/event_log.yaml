    node_id: n1_charter
    ts: "2026-07-02T14:00:00Z"
    kind: pre_effect
    from_status: ready
    to_status: running
    phase: 0
    intent: "run the Charter interview"
    idempotency_key: "n1_charter#attempt1"
    outcome: null
    result_hash: null
  - seq: 1
    node_id: n1_charter
    ts: "2026-07-02T14:03:00Z"
    kind: post_effect
    outcome: ok
    result_hash: "sha256:abc123"
