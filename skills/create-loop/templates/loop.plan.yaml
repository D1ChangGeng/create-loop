schema_version: 1.0.0
plan_id: plan-example-0001
goal: State the user's goal verbatim here.
true_intent: What success really means, surfaced by the interview.
non_goals:
- Anything not required to satisfy the success criteria.
success_criteria:
- id: sc-1
  statement: The built artifact passes its automated checks.
  measurable: true
- id: sc-2
  statement: A human approves the final result.
  measurable: false
failure_criteria:
- Budget exhausted before success_criteria are met.
termination:
  max_iterations: 25
  max_wall_clock_hours: 8
  max_cost_units: 500
  done_when: all success_criteria met and all top-level nodes completed
  max_depth: 3
  max_child_loops: 20
constraints:
- Respect the stated budget and tech stack.
nodes:
- id: goal_clarification
  kind: milestone
  title: Clarify the goal and true intent
  design_invariant: true
  status: completed
  requires: []
  produces:
  - artifacts/clarified_brief.md
  inputs: []
  preconditions: []
  postconditions:
  - The true_intent is agreed and recorded.
  gate:
    kind: artifact_exists
    threshold: null
    rubric: null
    evidence_ref: evidence/goal_clarification.json
  retry_policy:
    max_attempts: 2
    backoff_base_seconds: 1.0
    jitter: true
  on_failure: escalate
  priority: 100
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: agent
  notes: ''
- id: discovery
  kind: milestone
  title: Discover context and constraints
  design_invariant: true
  status: completed
  requires:
  - goal_clarification
  produces:
  - artifacts/findings.md
  inputs:
  - artifacts/clarified_brief.md
  preconditions:
  - The clarified brief exists.
  postconditions:
  - Key unknowns are enumerated with evidence.
  gate:
    kind: llm_judge
    threshold: 0.8
    rubric: rubrics/discovery_quality.md
    evidence_ref: evidence/discovery.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 2.0
    jitter: true
  on_failure: local_retry
  priority: 90
  risk: med
  parallelizable: false
  allow_subgraph: true
  subgraph: null
  child_loops: []
  assignee: subagent
  notes: Set allow_subgraph so a deep investigation can expand into its own mini-plan.
- id: build
  kind: milestone
  title: Build the deliverable
  design_invariant: true
  status: ready
  requires:
  - discovery
  produces:
  - artifacts/deliverable/
  inputs:
  - artifacts/findings.md
  preconditions:
  - Findings are verified.
  postconditions:
  - The deliverable builds and its tests pass.
  gate:
    kind: test
    threshold: null
    rubric: null
    evidence_ref: evidence/build_tests.json
  retry_policy:
    max_attempts: 3
    backoff_base_seconds: 5.0
    jitter: true
  on_failure: local_patch
  priority: 80
  risk: high
  parallelizable: false
  allow_subgraph: true
  subgraph: null
  child_loops:
  - loop_id: L001.01
    path: _loops/L001.01-build-deliverable
    spawn_reason: 'high complexity + independent evidence audit (Admission Gate #1, #3)'
    status: running
    closeout: _loops/L001.01-build-deliverable/closeout.md
  assignee: agent
  notes: ''
- id: final_approval
  kind: approval
  title: Human sign-off on the deliverable
  design_invariant: true
  status: pending
  requires:
  - build
  produces:
  - artifacts/approval_record.md
  inputs:
  - artifacts/deliverable/
  preconditions:
  - The build gate has passed.
  postconditions:
  - A human has approved the result.
  gate:
    kind: human_approval
    threshold: null
    rubric: null
    evidence_ref: evidence/final_approval.json
  retry_policy:
    max_attempts: 1
    backoff_base_seconds: 0.0
    jitter: false
  on_failure: escalate
  priority: 70
  risk: low
  parallelizable: false
  allow_subgraph: false
  subgraph: null
  child_loops: []
  assignee: user
  notes: Waits on a human_approval handoff; surfaced via checkpoint.pending_approvals.
created: '2026-07-02'
plan_version: 1
human_intervention_policy:
  default_mode: structured_decision_package
  forbid_low_context_questions: true
  require_context_complete_package: true
  require_machine_ingestible_answer: true
  preferred_answer_format: yaml
  decision_package_required_when:
  - top_level_goal_change
  - scope_expansion
  - major_resource_cost
  - external_side_effect
  - irreversible_operation
  - legal_security_compliance_licensing_risk
  - permission_or_credential_required
  - user_value_preference_required
  - no_evidence_backed_dominant_option
  - long_term_knowledge_promotion
  package_must_include:
  - decision_id
  - required_decision
  - reason_human_decision_is_required
  - current_loop_context
  - top_level_goal
  - non_goals
  - hard_constraints
  - evidence_summary
  - attempted_actions
  - candidate_options
  - tradeoff_analysis
  - reversibility
  - risk_profile
  - system_recommendation
  - consequence_of_no_decision
  - required_answer_schema
plan_history:
- plan_version: 1
  reason: Initial plan version (v0 from the Charter interview).
  superseded_at: null
  goal_hash: 64aae5a94861dbd9e641aff6280c128b083cb8d50276b997a15d41d657d340f2
  true_intent_hash: 76d0d26c4853c4cad71f6c6b39c4617eb825031fe3e708bc60be0e38d5a281cd
